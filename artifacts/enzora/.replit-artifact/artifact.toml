kind = "mobile"
previewPath = "/"
title = "Enzora"
version = "1.0.0"
id = "artifacts/enzora"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18511

[services.development]
run = "pnpm --filter @workspace/enzora run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/enzora", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/enzora", "run", "serve" ]

[services.env]
PORT = "18511"
BASE_PATH = "/"
